<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Registration System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <div class="header-text">
                    <h1>Complaint Registration System</h1>
                    <p>Submit and track your complaints efficiently</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Statistics -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card stat-total">
                    <div class="stat-content">
                        <div class="stat-text">
                            <p class="stat-label">Total Complaints</p>
                            <p class="stat-value" id="totalCount">0</p>
                        </div>
                        <div class="stat-icon stat-icon-total">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="stat-card stat-pending">
                    <div class="stat-content">
                        <div class="stat-text">
                            <p class="stat-label">Pending</p>
                            <p class="stat-value" id="pendingCount">0</p>
                        </div>
                        <div class="stat-icon stat-icon-pending">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="stat-card stat-progress">
                    <div class="stat-content">
                        <div class="stat-text">
                            <p class="stat-label">In Progress</p>
                            <p class="stat-value" id="progressCount">0</p>
                        </div>
                        <div class="stat-icon stat-icon-progress">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="stat-card stat-resolved">
                    <div class="stat-content">
                        <div class="stat-text">
                            <p class="stat-label">Resolved</p>
                            <p class="stat-value" id="resolvedCount">0</p>
                        </div>
                        <div class="stat-icon stat-icon-resolved">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabs and Content -->
            <div class="card">
                <!-- Tab Navigation -->
                <div class="tabs">
                    <button class="tab-button active" id="submitTab" onclick="switchTab('submit')">
                        Submit Complaint
                    </button>
                    <button class="tab-button" id="viewTab" onclick="switchTab('view')">
                        <span>View Complaints</span>
                        <span class="badge" id="complaintBadge">0</span>
                    </button>
                </div>

                <!-- Tab Content -->
                <div class="tab-content">
                    <!-- Submit Form Tab -->
                    <div class="tab-pane active" id="submitPane">
                        <form id="complaintForm" class="complaint-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="name">Full Name *</label>
                                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                                </div>

                                <div class="form-group">
                                    <label for="email">Email Address *</label>
                                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                                </div>

                                <div class="form-group">
                                    <label for="phone">Phone Number *</label>
                                    <input type="tel" id="phone" name="phone" required placeholder="+1 (555) 000-0000">
                                </div>

                                <div class="form-group">
                                    <label for="category">Complaint Category *</label>
                                    <select id="category" name="category" required>
                                        <option value="">Select a category</option>
                                        <option value="service">Service Quality</option>
                                        <option value="product">Product Issue</option>
                                        <option value="billing">Billing/Payment</option>
                                        <option value="delivery">Delivery</option>
                                        <option value="staff">Staff Behavior</option>
                                        <option value="technical">Technical Issue</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="subject">Subject *</label>
                                <input type="text" id="subject" name="subject" required placeholder="Brief summary of your complaint">
                            </div>

                            <div class="form-group">
                                <label for="description">Description *</label>
                                <textarea id="description" name="description" required rows="6" placeholder="Please provide detailed information about your complaint..."></textarea>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn-primary">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                    Submit Complaint
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- View Complaints Tab -->
                    <div class="tab-pane" id="viewPane">
                        <!-- Filter Buttons -->
                        <div class="filter-buttons" id="filterButtons">
                            <button class="filter-btn active" onclick="filterComplaints('all')">
                                All (<span id="filterAllCount">0</span>)
                            </button>
                            <button class="filter-btn filter-pending" onclick="filterComplaints('pending')">
                                Pending (<span id="filterPendingCount">0</span>)
                            </button>
                            <button class="filter-btn filter-progress" onclick="filterComplaints('in-progress')">
                                In Progress (<span id="filterProgressCount">0</span>)
                            </button>
                            <button class="filter-btn filter-resolved" onclick="filterComplaints('resolved')">
                                Resolved (<span id="filterResolvedCount">0</span>)
                            </button>
                        </div>

                        <!-- Complaints List -->
                        <div id="complaintsList" class="complaints-list">
                            <!-- Complaints will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Complaint Registration System. All rights reserved.</p>
            <p class="footer-tech">Frontend: HTML, CSS, JavaScript | Backend: Python Flask</p>
        </div>
    </footer>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner hidden">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Quiz Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>Interactive Quiz Platform</h1>
    <p>Test your knowledge with real-time feedback</p>
</header>

<main class="quiz-container">

    <section class="quiz-box">

        <div class="quiz-top">
            <div class="progress-container">
                <div id="progress"></div>
            </div>
            <div class="timer">
                ⏳ <span id="time">15</span>s
            </div>
        </div>

        <article id="question-box">
            <h2 id="question">Question Text</h2>
        </article>

        <section id="options" class="options"></section>

        <div class="controls">
            <button id="nextBtn" disabled>Next</button>
        </div>

    </section>

    <section id="result-box" class="result hidden">
        <h2>Quiz Completed 🎉</h2>
        <p>Your Score: <span id="score"></span></p>
        <p id="feedback"></p>
        <button id="restartBtn">Restart Quiz</button>
    </section>

</main>

<footer class="footer">
    <p>© 2026 Interactive Quiz | Designed by Aarushi</p>
</footer>

<script src="script.js"></script>
</body>
